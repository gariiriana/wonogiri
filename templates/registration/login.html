{% extends 'base.html' %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden bg-gray-900">
    <!-- Premium Background Image -->
    <div class="absolute inset-0 z-0">
        <img src="/static/images/auth_bg.png" class="w-full h-full object-cover opacity-60 scale-105 transition-all duration-[20s] hover:scale-100" alt="Background">
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-black/60"></div>
    </div>

    <div class="w-full max-w-md space-y-8 relative z-10">
        <div class="text-center">
            <div class="w-20 h-20 bg-orange-600 rounded-3xl flex items-center justify-center text-white mx-auto shadow-2xl shadow-orange-500/50 mb-6 rotate-3 transform hover:rotate-0 transition-transform">
                <i data-lucide="store" class="w-12 h-12"></i>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tight mb-2 drop-shadow-lg">Wonogiri</h1>
            <p class="text-orange-100/80 font-medium">Masuk untuk mengelola catatan utang warung</p>
        </div>

        <div class="bg-white/95 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl border border-white/20 relative overflow-hidden">
            <form method="post" class="space-y-6 relative z-10">
                {% csrf_token %}
                {% if form.errors %}
                <div class="p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-sm font-medium animate-pulse">
                    Email atau Password salah bro. Coba lagi!
                </div>
                {% endif %}
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                    <div class="relative group">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                        <input type="text" name="username" required class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl py-4 pl-12 pr-4 outline-none transition-all font-medium text-gray-900" placeholder="Username lo">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                        <input type="password" id="password_input" name="password" required class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl py-4 pl-12 pr-12 outline-none transition-all font-medium text-gray-900" placeholder="••••••••">
                        <button type="button" id="toggle_password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-orange-500 transition-colors">
                            <i data-lucide="eye" id="eye_open" class="w-5 h-5"></i>
                            <i data-lucide="eye-off" id="eye_closed" class="w-5 h-5 hidden"></i>
                        </button>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-500/40 transform active:scale-95 transition-all text-lg tracking-wide">
                        MASUK SEKARANG
                    </button>
                    <p class="text-center text-xs text-gray-400 mt-6 font-bold uppercase tracking-widest">Wong Wonogiri Support System v2.0</p>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('toggle_password');
        const passwordInput = document.getElementById('password_input');
        const eyeOpen = document.getElementById('eye_open');
        const eyeClosed = document.getElementById('eye_closed');

        toggleBtn.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
                lucide.createIcons();
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
                lucide.createIcons();
            }
        });
    });
</script>
{% endblock %}
