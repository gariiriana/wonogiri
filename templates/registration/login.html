{% extends 'base.html' %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-orange-50 via-white to-orange-50">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center">
            <div class="w-20 h-20 bg-orange-600 rounded-3xl flex items-center justify-center text-white mx-auto shadow-xl shadow-orange-500/30 mb-6 rotate-3">
                <i data-lucide="store" class="w-12 h-12"></i>
            </div>
            <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-2">Wonogiri</h1>
            <p class="text-gray-500 font-medium">Masuk untuk mengelola catatan utang warung</p>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-white relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-orange-50 rounded-full blur-3xl opacity-50"></div>
            
            <form method="post" class="space-y-6 relative z-10">
                {% csrf_token %}
                {% if form.errors %}
                <div class="p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-sm font-medium">
                    Email atau Password salah bro. Coba lagi!
                </div>
                {% endif %}
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                    <div class="relative group">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                        <input type="text" name="username" required class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl py-4 pl-12 pr-4 outline-none transition-all font-medium text-gray-900" placeholder="Username lo">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                        <input type="password" name="password" required class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl py-4 pl-12 pr-4 outline-none transition-all font-medium text-gray-900" placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-500/40 transform active:scale-95 transition-all text-lg tracking-wide">
                        MASUK SEKARANG
                    </button>
                    <p class="text-center text-xs text-gray-400 mt-6 font-bold uppercase tracking-widest">Wong Wonogiri Support System v2.0</p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
