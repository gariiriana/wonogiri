{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonogiri - Masuk</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }

        .auth-wrapper {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('{% static "images/hero_bg.png" %}');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-blur: 2px;
            z-index: 1;
        }

        .auth-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: #FF6600;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(255, 102, 0, 0.4);
        }

        .header-text {
            text-align: center;
            color: white;
        }

        .header-text h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .header-text p {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.9;
        }

        .auth-card {
            background: white;
            width: 100%;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 640px) {
            .auth-card {
                padding: 40px;
                border-radius: 35px;
            }
        }

        .auth-card h2 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #4b5563;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e5e7eb;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: #FF6600;
            background: #fff9f5;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #FF6600;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(255, 102, 0, 0.3);
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: #e65c00;
            transform: translateY(-1px);
        }

        .footer-text {
            text-align: center;
            color: #d1d5db;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.6;
        }

        .error-msg {
            color: #ef4444;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-overlay"></div>
        
        <div class="auth-content">
            <div class="logo-box">
                <i data-lucide="wallet" style="color: white; width: 38px; height: 38px;"></i>
            </div>
            
            <div class="header-text">
                <h1>Catatan Utang Warung</h1>
                <p>Masuk untuk mengelola keuangan warung Anda</p>
            </div>

            <div class="auth-card">
                <h2>Masuk</h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="error-msg">Informasi login salah. Coba lagi bro!</div>
                    {% endif %}

                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" name="username" required placeholder="masukkan email anda">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password_input" name="password" required placeholder="••••••••">
                            <button type="button" id="toggle_password" class="toggle-btn">
                                <i data-lucide="eye" id="eye_open" style="width: 20px; height: 20px;"></i>
                                <i data-lucide="eye-off" id="eye_closed" class="hidden" style="width: 20px; height: 20px;"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i data-lucide="log-in" style="width: 20px; height: 20px;"></i>
                        Masuk
                    </button>
                </form>
            </div>

            <div class="footer-text">
                Sistem Manajemen Keuangan Warung<br>
                Secure & Professional
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
        
        // Password toggle logic
        const toggleBtn = document.getElementById('toggle_password');
        const passwordInput = document.getElementById('password_input');
        const eyeOpen = document.getElementById('eye_open');
        const eyeClosed = document.getElementById('eye_closed');

        toggleBtn.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
