{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{% url 'debt_management:debtor_list' %}" class="w-10 h-10 bg-white border border-gray-200 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-50 transition-colors shadow-sm">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h2 class="text-2xl font-bold text-gray-900">Tambah Pelanggan Baru</h2>
    </div>

    <div class="bg-white rounded-3xl p-8 border border-gray-100 shadow-sm">
        <form action="{% url 'debt_management:add_debtor' %}" method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nama Lengkap*</label>
                <input type="text" name="name" required class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl py-4 px-5 outline-none transition-all font-medium text-gray-900" placeholder="Contoh: Budi Santoso">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nama Panggilan</label>
                <input type="text" name="nickname" class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl py-4 px-5 outline-none transition-all font-medium text-gray-900" placeholder="Contoh: Pak Budi">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nomor Telepon</label>
                <input type="text" name="phone" class="w-full bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl py-4 px-5 outline-none transition-all font-medium text-gray-900" placeholder="0812XXX">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Foto Pelanggan (Opsional)</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-100 border-dashed rounded-2xl bg-gray-50/50 hover:bg-gray-50 transition-colors">
                    <div class="space-y-1 text-center">
                        <i data-lucide="camera" class="mx-auto h-12 w-12 text-gray-300"></i>
                        <div class="flex text-sm text-gray-600">
                            <label for="file-upload" class="relative cursor-pointer bg-white rounded-md font-bold text-orange-600 hover:text-orange-500 focus-within:outline-none">
                                <span>Pilih Gambar</span>
                                <input id="file-upload" name="photo" type="file" class="sr-only">
                            </label>
                            <p class="pl-1">atau tarik ke sini</p>
                        </div>
                        <p class="text-xs text-gray-400">PNG, JPG up to 5MB</p>
                    </div>
                </div>
            </div>
            <div class="pt-4">
                <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-500/30 transition-all text-lg tracking-wide uppercase">
                    SIMPAN DATA PELANGGAN
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
