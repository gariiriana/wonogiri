<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wonogiri - Catatan Utang Warung{% endblock %}</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    {% load static %}
    
    <!-- Enterprise Design System (Language Bar Injection) -->
    <link rel="stylesheet" href="{% static 'css/masterpiece.css' %}">
    <script src="{% static 'js/masterpiece.js' %}"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hero-bg {
            background-image: url('{% static "images/hero_bg.png" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .tab-active {
            background: white !important;
            color: #f97316 !important;
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.2);
        }

        .tab-inactive {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-gray-100">
    {% if user.is_authenticated %}
    <div class="hero-bg flex flex-col">
        <!-- Glass Header -->
        <header class="glass-header w-full">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-orange-500">
                        <i data-lucide="wallet" class="w-7 h-7"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold text-white tracking-tight drop-shadow-sm">Catatan Utang Warung</h1>
                        <p class="text-[11px] text-gray-100 font-semibold uppercase tracking-wider opacity-80">Kelola keuangan dengan mudah & profesional</p>
                    </div>
                </div>

                <form action="{% url 'debt_management:logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="flex items-center gap-2 px-5 py-2.5 bg-white/20 hover:bg-white/30 text-white font-bold rounded-xl backdrop-blur-md border border-white/30 transition-all text-sm">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Keluar
                    </button>
                </form>
            </div>

            <!-- Tab Navigation -->
            <div class="max-w-7xl mx-auto px-6 pb-6">
                <nav class="flex flex-wrap gap-4">
                    <a href="{% url 'debt_management:dashboard' %}" 
                       class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all {% if active_tab == 'dashboard' %}tab-active{% else %}tab-inactive{% endif %}">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                        Dashboard
                    </a>
                    <button onclick="WonogiriUI.toggleModal('addDebtorModal')" 
                       class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all {% if active_tab == 'add_debt' %}tab-active{% else %}tab-inactive{% endif %}">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        Catat Utang
                    </button>
                    <a href="{% url 'debt_management:debtor_list' %}" 
                       class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all {% if active_tab == 'debtors' %}tab-active{% else %}tab-inactive{% endif %}">
                        <i data-lucide="users" class="w-5 h-5"></i>
                        Daftar Utang
                    </a>
                    <a href="{% url 'debt_management:recap_view' %}" 
                       class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all {% if active_tab == 'recap' %}tab-active{% else %}tab-inactive{% endif %}">
                        <i data-lucide="line-chart" class="w-5 h-5"></i>
                        Rekap Keuangan
                    </a>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% else %}
        {% block auth_content %}{% endblock %}
    {% endif %}
</body>
</html>
