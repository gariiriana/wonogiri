<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wonogiri - Catatan Utang Warung{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen {% if user.is_authenticated %}bg-[url('/static/images/dashboard_bg.png')] bg-fixed bg-cover{% endif %}">
    {% if user.is_authenticated %}
    <div class="flex flex-col md:flex-row min-h-screen backdrop-blur-[2px] bg-white/40">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-white border-r border-gray-200">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="store" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-gray-900 tracking-tight">Wonogiri</h1>
                        <p class="text-[10px] text-gray-500 font-medium uppercase tracking-widest">Debt Records</p>
                    </div>
                </div>

                <nav class="space-y-1">
                    <a href="{% url 'debt_management:dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if active_tab == 'dashboard' %}bg-orange-50 text-orange-600 font-semibold{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                        Dashboard
                    </a>
                    <a href="{% url 'debt_management:debtor_list' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if active_tab == 'debtors' %}bg-orange-50 text-orange-600 font-semibold{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                        <i data-lucide="users" class="w-5 h-5"></i>
                        Daftar Utang
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-gray-600 hover:bg-gray-50">
                        <i data-lucide="file-text" class="w-5 h-5"></i>
                        Rekap
                    </a>
                </nav>
            </div>

            <div class="mt-auto p-6 border-t border-gray-100">
                <div class="flex items-center gap-3 mb-4 p-2 rounded-xl bg-gray-50">
                    <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 overflow-hidden">
                        <i data-lucide="user" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-semibold text-gray-900 truncate">{{ user.username }}</p>
                        <p class="text-[10px] text-gray-500 truncate">{{ user.email }}</p>
                    </div>
                </div>
                <form action="{% url 'debt_management:logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="w-full flex items-center gap-2 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Keluar
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% else %}
        {% block auth_content %}{% endblock %}
    {% endif %}

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
